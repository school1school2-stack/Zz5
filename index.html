<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي - نموذج (6) - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; --matte-red: #B22222; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        .header h3, .header h4 { color: var(--matte-red); margin: 5px 0; }
        input, select { width: 85%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .hidden { display: none !important; }
        #lock-screen { text-align: center; padding: 50px 20px; color: var(--wrong); }
        .loading-text { color: var(--maroon); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="quiz-card" id="main-container">
    <div class="header">
        <h3>أ / عبدالعزيز الفيفي ✨</h3>
        <h4>ثانوية الأمير عبدالمجيد 🎓</h4>
        <h2>محاكي القدرات اللفظي - نموذج (6)</h2>
    </div>

    <!-- رسالة الحظر -->
    <div id="lock-screen" class="hidden">
        <h1 style="font-size: 4rem;">⚠️</h1>
        <h2>تنبيه: محاولة مكررة</h2>
        <p id="lock-msg">عذراً، لا يمكن أداء الاختبار أكثر من مرة (سواءً بنفس الاسم أو من نفس الجهاز).</p>
    </div>

    <!-- واجهة البداية -->
    <div id="start-page" style="text-align: center;">
        <input type="text" id="studentName" placeholder="الاسم الثلاثي المعتمد">
        <select id="stageSelect" onchange="updateClasses()">
            <option value="">-- المرحلة الدراسية --</option>
            <option value="أول ثانوي">أول ثانوي</option>
            <option value="ثاني ثانوي">ثاني ثانوي</option>
            <option value="ثالث ثانوي">ثالث ثانوي</option>
        </select>
        <select id="studentClass" class="hidden"></select>
        <button id="start-btn" class="btn" onclick="secureStart()">تأكيد الهوية وبدء الاختبار 🚀</button>
        <p id="checking" class="loading-text hidden">جاري التحقق من السجلات السحابية للنزاهة...</p>
    </div>

    <!-- واجهة الأسئلة (مختصرة للأهمية) -->
    <div id="quiz-page" class="hidden">
        <div id="question-text" style="font-size: 1.4rem; text-align: center; margin-bottom: 20px;"></div>
        <div id="options-area" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">تم حفظ النتيجة بنجاح!</h2>
        <div style="font-size: 4rem; color: var(--gold);" id="score-text"></div>
    </div>
</div>

<script>
    const currentModelId = "model_6"; 
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function generateFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top"; ctx.font = "16px 'Arial'";
        ctx.fillText("Al-Faifi-Secure-V6", 2, 2);
        return btoa(canvas.toDataURL()).substring(160, 210);
    }
    const deviceID = generateFingerprint();

    async function secureStart() {
        const nameInput = document.getElementById('studentName').value.trim();
        const classInput = document.getElementById('studentClass').value;
        
        if(nameInput.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        if(!classInput) return alert("يرجى اختيار الفصل.");

        const btn = document.getElementById('start-btn');
        const loader = document.getElementById('checking');
        btn.disabled = true;
        loader.classList.remove('hidden');

        try {
            // القفل المزدوج: فحص الجهاز + فحص الاسم
            const deviceCheck = await db.collection("student_results")
                .where("model_id", "==", currentModelId)
                .where("deviceID", "==", deviceID).get();

            const nameCheck = await db.collection("student_results")
                .where("model_id", "==", currentModelId)
                .where("name", "==", nameInput).get();

            if (!deviceCheck.empty || !nameCheck.empty) {
                document.getElementById('start-page').innerHTML = ""; // حذف الواجهة فوراً
                document.getElementById('lock-screen').classList.remove('hidden');
                if(!nameCheck.empty) document.getElementById('lock-msg').innerText = "هذا الاسم مسجل لدينا بالفعل في هذا النموذج.";
                return;
            }

            // إذا كان الطالب جديداً، يبدأ الاختبار
            startQuiz(nameInput, classInput);

        } catch (error) {
            alert("خطأ في الاتصال بالسحابة، يرجى المحاولة لاحقاً.");
            btn.disabled = false;
        }
    }

    function startQuiz(n, c) {
        // منطق تشغيل الأسئلة كما في الكود السابق...
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        // هنا يتم استكمال وظائف loadQuestion و finish المعتادة
    }

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        }
    }
</script>
</body>
</html>
