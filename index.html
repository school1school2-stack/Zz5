<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي القدرات اللفظي - نموذج (6) - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828; --matte-red: #B22222; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; user-select: none; }
        .quiz-card { background: var(--white); width: 100%; max-width: 900px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); padding: 30px; position: relative; }
        /* استخدام الأحمر المطفي بناءً على تعليماتك */
        .header h3, .header h2 { color: var(--matte-red) !important; text-align: center; margin: 5px 0; }
        .header { border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        input, select { width: 85%; padding: 14px; border-radius: 8px; border: 1.5px solid #ccc; font-size: 1.1rem; outline: none; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #f4f4f4; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 25px; line-height: 1.8; color: #222; }
        .reading-box { background: #fff9e6; border: 1.5px solid #f0e68c; padding: 20px; border-radius: 12px; margin-bottom: 20px; line-height: 1.8; font-size: 1.1rem; text-align: justify; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { padding: 18px; border: 2px solid #ececec; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem; background: #fff; font-weight: 600; }
        .opt:hover { border-color: var(--gold); background: #fffcf0; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .btn { background: var(--maroon); color: var(--gold); padding: 14px 50px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .hidden { display: none !important; }
        #lock-screen { text-align: center; padding: 50px 20px; color: var(--wrong); }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableF12(event);">

<div class="quiz-card">
    <div class="header">
        <h3>أ / عبدالعزيز الفيفي ✨</h3>
        <h4>ثانوية الأمير عبدالمجيد 🎓</h4>
        <h2>محاكي القدرات اللفظي - نموذج (6)</h2>
    </div>

    <div id="lock-screen" class="hidden">
        <h1 style="font-size: 4rem;">⚠️</h1>
        <h2>عذراً، لا يمكن إعادة الاختبار</h2>
        <p>لقد قمت بحل هذا النموذج مسبقاً. سياسة الاختبار تمنع الإعادة لضمان النزاهة.</p>
    </div>

    <div id="start-page" style="text-align: center;">
        <input type="text" id="studentName" placeholder="الاسم الثلاثي">
        <select id="stageSelect" onchange="updateClasses()">
            <option value="">-- المرحلة الدراسية --</option>
            <option value="أول ثانوي">أول ثانوي</option>
            <option value="ثاني ثانوي">ثاني ثانوي</option>
            <option value="ثالث ثانوي">ثالث ثانوي</option>
        </select>
        <select id="studentClass" class="hidden"></select>
        <button id="start-btn" class="btn" onclick="secureStart()">بدء الاختبار الآن 🚀</button>
        <p id="checking" class="hidden">جاري التحقق من أمان الجهاز...</p>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nav-bar">
            <div id="q-counter" style="font-weight: bold;"></div>
            <div id="timer" style="font-weight: 900; color: var(--maroon); font-size: 1.4rem;">45</div>
        </div>
        <div id="reading-container" class="reading-box hidden"></div>
        <div id="question-text" class="q-text"></div>
        <div id="options-area" class="options-grid"></div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden" style="text-align: center;">
        <h2 style="color: var(--maroon);">تم الانتهاء! نتيجتك هي:</h2>
        <div style="font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold);" id="score-text"></div>
    </div>
</div>

<script>
    const currentModelId = "model_6"; 
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // منع اختصارات المطور
    function disableF12(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false;
    }

    // إنشاء بصمة قوية للجهاز (Canvas Fingerprint)
    function generateSecureID() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top";
        ctx.font = "14px 'Arial'";
        ctx.fillStyle = "#f60";
        ctx.fillRect(125,1,62,20);
        ctx.fillStyle = "#069";
        ctx.fillText("Al-Faifi-Secure-ID", 2, 15);
        ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
        ctx.fillText("Al-Faifi-Secure-ID", 4, 17);
        const result = canvas.toDataURL();
        return btoa(result).substring(100, 150); 
    }

    const deviceID = generateSecureID();

    // التحقق الفوري عند التحميل
    window.onload = function() {
        if(localStorage.getItem('completed_' + currentModelId)) {
            showLock();
        }
    }

    function showLock() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('hidden');
    }

    // مصفوفة الأسئلة (نفس بياناتك الأصلية)
    const quizData = [
        { cat: "التناظر اللفظي", q: "نحل : خلية", opts: ["نمل : قرية", "صقر : وكر", "خيل : إسطبل", "طير : عش"], ans: "نمل : قرية", tip: "✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓" },
        // ... (بقية الأسئلة تضاف هنا)
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        }
    }

    async function secureStart() {
        const nameInput = document.getElementById('studentName').value.trim();
        const classInput = document.getElementById('studentClass').value;
        if(nameInput.split(' ').length < 3) return alert("الاسم الثلاثي مطلوب.");
        if(!classInput) return alert("اختر الفصل.");

        document.getElementById('start-btn').disabled = true;
        document.getElementById('checking').classList.remove('hidden');

        // التحقق من قاعدة البيانات (FireStore) بالبصمة
        const q = await db.collection("student_results")
                    .where("deviceID", "==", deviceID)
                    .where("model_id", "==", currentModelId)
                    .get();

        if(!q.empty) {
            localStorage.setItem('completed_' + currentModelId, 'true');
            showLock();
            return;
        }

        sName = nameInput; sClass = classInput;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= quizData.length) return finish();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx+1} من ${quizData.length}`;
        const rc = document.getElementById('reading-container');
        if(data.passage) { rc.innerText = data.passage; rc.classList.remove('hidden'); }
        else { rc.classList.add('hidden'); }
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random()-0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => {
                clearInterval(timer);
                if(o === data.ans) userScore++;
                document.querySelectorAll('.opt').forEach(el => {
                    el.onclick = null;
                    if(el.innerText === data.ans) el.classList.add('correct');
                    else if(el.innerText === o) el.classList.add('wrong');
                });
                document.getElementById('next-btn').classList.remove('hidden');
            };
            box.appendChild(d);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s<=0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / ${quizData.length}`;
        
        // حفظ النتيجة وتثبيت القفل
        localStorage.setItem('completed_' + currentModelId, 'true');
        await db.collection("student_results").add({
            name: sName, student_class: sClass, score: userScore, total: quizData.length,
            model_id: currentModelId, deviceID: deviceID, time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
</script>
</body>
</html>
