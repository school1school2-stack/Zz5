    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function updateClasses() {
        const stage = document.getElementById('stageSelect').value;
        const classSelect = document.getElementById('studentClass');
        classSelect.innerHTML = '<option value="">-- اختر الفصل --</option>';
        if (stage) {
            classSelect.classList.remove('hidden');
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = `${stage} - ${i}`;
                opt.innerText = `فصل ${i}`;
                classSelect.appendChild(opt);
            }
        } else { classSelect.classList.add('hidden'); }
    }

    async function checkDoubleEntry() {
        const nameInput = document.getElementById('studentName').value.trim();
        const classInput = document.getElementById('studentClass').value;
        if(nameInput.split(' ').length < 3) return alert("يرجى كتابة الاسم الثلاثي.");
        if(!classInput) return alert("يرجى اختيار الفصل.");

        const btn = document.getElementById('start-btn');
        btn.innerText = "تحقق من المحاولات... ⏳";
        btn.disabled = true;

        try {
            const snapshot = await db.collection("student_results")
                .where("name", "==", nameInput)
                .where("model_id", "==", currentModelId)
                .get();

            if (!snapshot.empty || localStorage.getItem('taken_' + currentModelId)) {
                alert("يا " + nameInput + "، لقد تم رصد محاولة سابقة لك في (نموذج 5).");
                location.reload();
            } else { startQuiz(nameInput, classInput); }
        } catch (e) { startQuiz(nameInput, classInput); }
    }

        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (الغدر - الجبن - البخل - الحزن)", opts: ["الغدر", "الجبن", "البخل - الحزن", "الحزن"], ans: "الحزن", tip: "الحزن شعور، البقية رذائل أخلاقية وسلوكيات." },
        { cat: "المفردة الشاذة", q: "حدد المفردة الشاذة: (الذهب - الألماس - الفضة - النحاس)", opts: ["الذهب", "الألماس", "الفضة", "النحاس"], ans: "الألماس", tip: "الألماس لا فلز (كربون)، البقية معادن فلزية." },

        // ارتباط واختلاف - مستوى مرتفع
        { cat: "الارتباط والاختلاف", q: "ما الكلمة التي ترتبط بـ 'الصبر'؟", opts: ["الظفر", "الفشل", "العجلة", "الملل"], ans: "الظفر", tip: "من صبر ظفر (علاقة نتيجة)." },
        { cat: "الارتباط والاختلاف", q: "أي مما يلي يختلف في فصيلة الحيوان؟", opts: ["الحوت", "القرش", "الدلفين", "خروف البحر"], ans: "القرش", tip: "القرش سمكة، البقية ثدييات مائية." },
        { cat: "الارتباط والاختلاف", q: "ما الكلمة التي ترتبط بـ 'الموسوعة'؟", opts: ["الشمول", "الاختصار", "الغموض", "التخصص"], ans: "الشمول", tip: "الموسوعة تتصف بالشمول المعرفي." },
        { cat: "الارتباط والاختلاف", q: "أي المدن التالية تختلف في الموقع الجغرافي؟", opts: ["الرياض", "القاهرة", "عمان", "بغداد"], ans: "القاهرة", tip: "القاهرة في أفريقيا، البقية في آسيا." },
        { cat: "الارتباط والاختلاف", q: "ما الكلمة المرتبطة بـ 'الهندسة'؟", opts: ["البركار", "المشرط", "المجهر", "الفرشاة"], ans: "البركار", tip: "البركار (الفرجار) أداة هندسية أساسية." },
        { cat: "الارتباط والاختلاف", q: "أي من هؤلاء الشعراء يختلف عن البقية؟", opts: ["أحمد شوقي", "حافظ إبراهيم", "عنترة بن شداد", "البارودي"], ans: "عنترة بن شداد", tip: "عنترة جاهلي، البقية من مدرسة الإحياء والبعث (العصر الحديث)." }
    ];

    let currentIdx = 0, userScore = 0, timer, sName, sClass;

    function startQuiz(name, cls) {
        sName = name; sClass = cls;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= quizData.length) return finishQuiz();
        const data = quizData[currentIdx];
        document.getElementById('q-counter').innerText = `سؤال ${currentIdx + 1} من ${quizData.length}`;
        document.getElementById('question-category').innerText = `القسم: ${data.cat}`;
        const rc = document.getElementById('reading-container');
        if(data.passage) { rc.innerText = data.passage; rc.classList.remove('hidden'); }
        else { rc.classList.add('hidden'); }
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-area').style.display = 'none';
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => check(o, d); box.appendChild(d);
        });
        startTimer();
    }

    function check(sel, el) {
        clearInterval(timer); const correctAns = quizData[currentIdx].ans;
        if(sel === correctAns) userScore++;
        document.querySelectorAll('.opt').forEach(opt => {
            opt.onclick = null;
            if(opt.innerText === correctAns) opt.classList.add('correct');
            else if(opt.innerText === sel) opt.classList.add('wrong');
        });
        const fbArea = document.getElementById('feedback-area');
        fbArea.innerText = "تحليل أ/ عبدالعزيز: " + quizData[currentIdx].tip; fbArea.style.display = 'block';
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(timer); check("N/A", null); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finishQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-text').innerText = `${userScore} / ${quizData.length}`;
        localStorage.setItem('taken_' + currentModelId, 'true');
        try {
            await db.collection("student_results").add({
                name: sName, student_class: sClass, score: userScore, total: quizData.length, model_id: currentModelId,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('cloud-msg').innerText = "✅ تم تسجيل إبداعك في نموذج (5) يا " + sName;
        } catch(e) { console.error(e); }
    }
</script>
